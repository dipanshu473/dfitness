<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up</title>

    <link rel="stylesheet" href="signup.css">

</head>

<body>

    <div class="container">

        <div class="signup-box">

            <h1>Create Account</h1>

            <p>Join DFitness Today</p>

            <form id="registerForm">

                <div class="input-box">

                    <input type="text"
                           id="name"
                           placeholder="Full Name">

                </div>

                <div class="input-box">

                    <input type="email"
                           id="email"
                           placeholder="Email Address">

                </div>

                <div class="input-box">

                    <input type="password"
                           id="password"
                           placeholder="Password">

                </div>

                <button type="submit"
                        class="signup-btn">

                    Sign Up

                </button>

            </form>

            <div class="bottom-text">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </div>

    <script src="signup.js"></script>

</body>

</html>
